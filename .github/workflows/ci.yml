name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: platform

      - name: Build shared
        run: pnpm --filter @mercashop/shared build
        working-directory: platform

      - name: Lint
        run: pnpm -r lint
        working-directory: platform

      - name: Typecheck
        run: pnpm -r typecheck
        working-directory: platform

      - name: Test
        run: pnpm -r test
        working-directory: platform
